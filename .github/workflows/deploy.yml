name: Django CI/CD

on:
  push:
    branches: [ "main" ]   # Le pipeline se déclenche à chaque push sur la branche main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations
      run: |
        python manage.py migrate

    - name: Collect static files
      run: |
        python manage.py collectstatic --noinput

    - name: Run tests
      run: |
        python manage.py test

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Reload PythonAnywhere app
      run: |
        curl -u ${{ secrets.PA_USERNAME }}:${{ secrets.PA_API_TOKEN }} \
        https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/reload/kramsEquipement.pythonanywhere.com/
